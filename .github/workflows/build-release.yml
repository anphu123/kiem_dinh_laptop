name: Build & Release v2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Build Windows EXE ───────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: hardware_scanner
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.28.3" pyinstaller
          pip install psutil "qrcode[pil]" certifi requests
          pip install numpy Pillow opencv-python-headless sounddevice
          pip install wmi pywin32

      - name: Inject API key
        working-directory: hardware_scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python build_inject_key.py

      - name: Build EXE
        working-directory: hardware_scanner
        run: |
          flet pack app.py `
            --name O2O_Inspection `
            --icon icon.ico `
            --add-data "_embedded_key.py;." `
            --add-data "checklist.json;." `
            --hidden-import _embedded_key `
            --hidden-import controllers.scan_controller `
            --hidden-import controllers.checklist_controller `
            --hidden-import controllers.pricing_controller `
            --hidden-import controllers.cam_mic_controller `
            --hidden-import models.hardware `
            --hidden-import models.checklist `
            --hidden-import models.pricing `
            --hidden-import gemini_pricer `
            --hidden-import scanner `
            --hidden-import cv2 `
            --hidden-import sounddevice `
            --uac-admin

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: O2O_Inspection_Windows
          path: hardware_scanner/dist/O2O_Inspection.exe
          retention-days: 30

  # ── Build macOS .app ────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: brew install portaudio

      - name: Install dependencies
        working-directory: hardware_scanner
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.28.3" pyinstaller
          pip install psutil "qrcode[pil]" certifi requests
          pip install numpy Pillow opencv-python-headless sounddevice

      - name: Inject API key
        working-directory: hardware_scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python build_inject_key.py

      - name: Build .app
        working-directory: hardware_scanner
        run: |
          flet pack app.py \
            --name O2O_Inspection \
            --icon icon.icns \
            --codesign-identity - \
            --bundle-id com.o2o.laptop-inspection \
            --add-data "_embedded_key.py:." \
            --add-data "checklist.json:." \
            --hidden-import _embedded_key \
            --hidden-import controllers.scan_controller \
            --hidden-import controllers.checklist_controller \
            --hidden-import controllers.pricing_controller \
            --hidden-import controllers.cam_mic_controller \
            --hidden-import models.hardware \
            --hidden-import models.checklist \
            --hidden-import models.pricing \
            --hidden-import gemini_pricer \
            --hidden-import scanner \
            --hidden-import cv2 \
            --hidden-import sounddevice

      - name: Add macOS privacy usage descriptions
        run: |
          PLIST=hardware_scanner/dist/O2O_Inspection.app/Contents/Info.plist
          plutil -insert NSCameraUsageDescription \
            -string "Dùng để kiểm tra camera laptop trong quá trình kiểm định." "$PLIST"
          plutil -insert NSMicrophoneUsageDescription \
            -string "Dùng để kiểm tra microphone laptop trong quá trình kiểm định." "$PLIST"

      - name: Ad-hoc sign & strip quarantine
        run: |
          APP=hardware_scanner/dist/O2O_Inspection.app
          # Deep sign toàn bộ bundle (bao gồm frameworks, dylibs)
          codesign --force --deep --sign - "$APP"
          # Xóa quarantine flag khỏi bundle trước khi zip
          xattr -cr "$APP"

      - name: Create launcher script
        run: |
          SCRIPT='#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nAPP="$DIR/O2O_Inspection.app"\nxattr -cr "$APP" 2>/dev/null\nopen "$APP"\n'
          printf '%b' "$SCRIPT" > hardware_scanner/dist/Mo_App.command
          chmod +x hardware_scanner/dist/Mo_App.command

      - name: Zip .app bundle
        run: |
          cd hardware_scanner/dist
          if [ -d "O2O_Inspection.app" ]; then
            zip -ry O2O_Inspection_mac.zip O2O_Inspection.app Mo_App.command
          else
            zip -ry O2O_Inspection_mac.zip O2O_Inspection Mo_App.command
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: O2O_Inspection_macOS
          path: hardware_scanner/dist/O2O_Inspection_mac.zip
          retention-days: 30

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: O2O_Inspection_Windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: O2O_Inspection_macOS
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "O2O Inspection ${{ github.ref_name }}"
          body: |
            ## O2O Laptop Inspection ${{ github.ref_name }}

            | File | Hệ điều hành |
            |------|-------------|
            | `O2O_Inspection.exe` | Windows 10 / 11 (64-bit) |
            | `O2O_Inspection_mac.zip` | macOS 12+ (Intel & Apple Silicon) |

            ### Cách dùng
            **Windows:**
            1. Download `O2O_Inspection.exe`
            2. Nếu SmartScreen hiện cảnh báo → click **"More info"** → **"Run anyway"**

            **macOS:**
            1. Giải nén `O2O_Inspection_mac.zip`
            2. **Chuột phải** vào `Mo_App.command` → **Open** → **Open**
            3. App tự khởi động (chỉ cần làm 1 lần)

            ### Tính năng v2
            - **Wizard 5 bước tự động:** Scan → Màn hình → Camera/Mic/Loa → Bàn phím → Kiểm định ngoại quan
            - **Transaction ID** mỗi phiên kiểm tra
            - **Màn hình fullscreen** test 7 màu (điểm chết, sọc màu)
            - **Camera auto-test** khi bước camera được kích hoạt
            - **AI định giá thu mua** Gemini tích hợp sẵn (không cần API key riêng)
            - **Mac model** đọc đúng từ system_profiler
            - **MVC architecture** — checklist.json có thể chỉnh sửa không cần build lại

            ### Lưu ý
            - Chạy với quyền Admin/sudo để đọc đầy đủ BIOS, pin, serial
          files: |
            release/O2O_Inspection.exe
            release/O2O_Inspection_mac.zip
          draft: false
          prerelease: false
