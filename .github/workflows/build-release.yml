name: Build & Release v2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Build Windows EXE ───────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: hardware_scanner
        run: |
          python -m pip install --upgrade pip
          pip install flet pyinstaller
          pip install psutil "qrcode[pil]" certifi requests beautifulsoup4
          pip install numpy Pillow opencv-python sounddevice
          pip install wmi pywin32
          pip install playwright
          playwright install chromium

      - name: Inject API key
        working-directory: hardware_scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python build_inject_key.py

      - name: Build EXE
        working-directory: hardware_scanner
        run: pyinstaller O2O_Inspection.spec --clean --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: O2O_Inspection_Windows
          path: hardware_scanner/dist/O2O_Inspection.exe
          retention-days: 30

  # ── Build macOS .app ────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: hardware_scanner
        run: |
          python -m pip install --upgrade pip
          pip install flet pyinstaller
          pip install psutil "qrcode[pil]" certifi requests beautifulsoup4
          pip install numpy Pillow opencv-python sounddevice
          pip install playwright
          playwright install chromium

      - name: Inject API key
        working-directory: hardware_scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python build_inject_key.py

      - name: Build .app
        working-directory: hardware_scanner
        run: pyinstaller O2O_Inspection_mac.spec --clean --noconfirm

      - name: Zip .app bundle
        working-directory: hardware_scanner/dist
        run: zip -r O2O_Inspection_mac.zip O2O_Inspection.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: O2O_Inspection_macOS
          path: hardware_scanner/dist/O2O_Inspection_mac.zip
          retention-days: 30

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: O2O_Inspection_Windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: O2O_Inspection_macOS
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "O2O Inspection ${{ github.ref_name }}"
          body: |
            ## O2O Laptop Inspection ${{ github.ref_name }}

            | File | Hệ điều hành |
            |------|-------------|
            | `O2O_Inspection.exe` | Windows 10 / 11 (64-bit) |
            | `O2O_Inspection_mac.zip` | macOS 12+ (Intel & Apple Silicon) |

            ### Cách dùng
            **Windows:** Double-click `O2O_Inspection.exe` — không cần cài Python, không cần .env

            **macOS:** Giải nén zip → chuột phải vào `.app` → Open (lần đầu bỏ qua cảnh báo Gatekeeper)

            ### Tính năng v2
            - **Wizard 6 bước tự động:** Scan → Bảo hành → Màn hình → Camera/Mic/Loa → Bàn phím → Kiểm định ngoại quan
            - **Transaction ID** mỗi phiên kiểm tra
            - **Màn hình fullscreen** test 7 màu (điểm chết, sọc màu)
            - **Camera auto-test** khi bước camera được kích hoạt
            - **AI định giá thu mua** Gemini tích hợp sẵn (không cần API key riêng)
            - **Mac model** đọc đúng từ system_profiler
            - **MVC architecture** — checklist.json có thể chỉnh sửa không cần build lại

            ### Lưu ý
            - Chạy với quyền Admin/sudo để đọc đầy đủ BIOS, pin, serial
            - Tính năng tra cứu bảo hành TGDD cần kết nối internet
          files: |
            release/O2O_Inspection.exe
            release/O2O_Inspection_mac.zip
          draft: false
          prerelease: false
